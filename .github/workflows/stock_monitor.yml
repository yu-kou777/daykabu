name: Stock Monitor

on:
  schedule:
    # 日本時間 13:30（UTC 04:30）に設定。
    # 大幅な遅延（1.5時間程度）が発生しても、15:00過ぎに実行が開始されるようにします。
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas-ta requests openpyxl xlrd lxml beautifulsoup4
      - name: Run monitor
        run: python monitor_stocks.py
