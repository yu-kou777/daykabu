name: Stock Monitor

on:
  schedule:
    - cron: '0 9 * * 1-5' # 平日 UTC 9:00 (日本時間 18:00)
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas-ta numpy requests xlrd openpyxl
      - name: Run script
        run: python monitor_stocks.py
