name: Stock Monitor

on:
  schedule:
    # 日本時間 14:30（UTC 05:30）に起動予約。遅延しても15:20までには終わる計算です。
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas-ta requests openpyxl xlrd lxml beautifulsoup4
      - name: Run monitor
        run: python monitor_stocks.py
