name: Stock Monitor

on:
  schedule:
    # 06:00 UTC = 15:00 JST
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 手動で「Run workflow」を押すためのボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas-ta requests openpyxl xlrd lxml beautifulsoup4
      - name: Run monitor
        run: python monitor_stocks.py
