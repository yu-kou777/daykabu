name: Stock Monitor

on:
  schedule:
    # 日本時間 12:30 (UTC 03:30)
    # 大幅な遅延が発生しても、15:00の市場終了前に通知を届かせるための設定です。
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas pandas-ta requests openpyxl xlrd lxml beautifulsoup4
      - name: Run monitor
        run: python monitor_stocks.py
